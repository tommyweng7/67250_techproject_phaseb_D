<!-- Images from sanfranciscopeninsula.com, stlouismagazine.com, matadornetwork.com -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Your Name">
    <meta name="keywords" content="Museum, Carnegie Mellon University, MonoMuse, Checkout">
    <meta name="description" content="MonoMuse Checkout page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoMuse - Checkout</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="../static/script.js" defer></script>

</head>

<body>

<div class="container">

    <header class="header">
        <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        <h1 class="site_title">MonoMuse</h1>
    </header>

    <nav class="nav_bar">
        <button class="hamburger" onclick="toggleNav()">☰</button>
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Tickets</a>
        <a href="checkout.html">Checkout</a>
    </nav>

    <main class="main">
    <section>
        <h2>Checkout</h2>

        <form id="checkoutForm">

            <!-- Adult Tickets -->
            <label for="adultQty">Adult Tickets:</label>
            <input type="number" id="adultQty" min="0" max="10" value="0">

            <br><br>

            <!-- Student Tickets -->
            <label for="studentQty">Student Tickets:</label>
            <input type="number" id="studentQty" min="0" max="10" value="0">

            <br><br>

            <!-- Member Tickets -->
            <label for="memberQty">Member Tickets:</label>
            <input type="number" id="memberQty" min="0" max="10" value="0">

            <br><br>

            <!-- Total -->
            <p><strong>Total Price: $<span id="totalPrice">0</span></strong></p>

            <br>

            <!-- Email -->
            <label for="email">Email (required):</label>
            <input type="email" id="email" required>

            <br><br>

            <!-- Zip -->
            <label for="zip">Zip Code (optional):</label>
            <input type="text" id="zip">

            <br><br>

            <!-- Mailing List -->
            <label>
                <input type="checkbox" id="mailingList">
                Join our mailing list
            </label>

            <br><br>

            <button type="submit">Place Order</button>

        </form>

            <p id="checkoutMessage" style="margin-top:15px; font-weight:bold;"></p>
        </section>
    </main>

<!-- Bring the picture back -->
<aside class="right_images">
    <div class="carousel">
  <div class="carousel-track">
    <img src="../static/Checkout.png" alt="Liqud-screen display" width="800">
    <img src="../static/Girl_screen.png" alt="Girl looking at a screen" width="800">
    <img src="../static/Screens.png" alt="Digital-screen based exhibit" width="800">
  </div>
  <button class="carousel-btn prev">&#10094;</button>
  <button class="carousel-btn next">&#10095;</button>
</div>
</aside>

    <footer class="footer">
        <p>© <span id="copyYear"></span> MonoMuse. All rights reserved.</p>
    </footer>

</div>

</body>
</html>
